<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron's Music</title>
<style>
/* 아이패드 및 웹 서버 환경 최적화 폰트 설정 */
@font-face {
  font-family: "Handwritten";
  /* 상대 경로를 명확히 하고, 로딩 지연 시 기본 폰트 먼저 보이게 설정 */
  src: url("./handwritten.ttf") format("truetype");
  font-display: swap; 
}

* {
  box-sizing: border-box;
  /* 기본 sans-serif를 백업으로 두어 폰트가 로드되는 동안 글자가 안 보이는 현상 방지 */
  font-family: "Handwritten", sans-serif;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
}

#player {
  width: 100%;
  height: 60vh;
  border: none;
  display: block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  display: block;
}

.title {
  padding: 10px;
  font-size: 14px;
}
</style>
</head>
<body>

<iframe id="player"
  src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
  allow="autoplay; encrypted-media" allowfullscreen>
</iframe>

<div id="grid" class="grid"></div>

<script>
// 주의: 배포된 웹사이트 주소가 확정되면 구글 클라우드 콘솔에서 API 키 사용 제한(HTTP 리퍼러)을 꼭 설정하세요.
const API_KEY = "AIzaSyDlZ1MbNErffWAZFClz90ORgSoWtIBu5vs";

const videos = [
  "lgaXjICBcsc","0AcuMH7KewM","003V9eO5knI","i2IK99Kli4E","h9vxTcUPz98",
  "MOtYJB8P0x0","moaAhsbh5Ds","ehrbOi8b4c4","iwFriq4fPQU","9PjnL0mRYm0",
  "T6ZYfaQqLyg","57D_tv9pj74","7V8JI93Lov4","tU3nx-f97WM","zKd2p9Y6yEY",
  "CCa4SuJCxA4","An0Tgf74XOY","qT8dDKNtPjo","V9HV8EoSyR4","nrn07ACbpkE",
  "So9BeU_Vy20","OLMK2AfMPjo","ZH-VB-jSVaU","6ef-aCP5zMY","YJJ_8w2zKbQ",
  "qtRCPzBpsA0","vbjLJnlB2kg","UbQFWXsoAM8","e6ngDwYb6Zo","gpDV5qUXNYc",
  "8asxySoKbTk","vsm7CWw5MYc","6FODI_m9p58","vmd00AxPpxo","8qoFBIkTAHk"
];

function play(id) {
  document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1`;
}

async function loadVideos() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videos.join(",")}&key=${API_KEY}`);
    const data = await res.json();
    
    const titleMap = {};
    if (data.items) {
      data.items.forEach(it => {
        titleMap[it.id] = it.snippet.title;
      });
    }
    
    videos.forEach(id => {
      const c = document.createElement('div');
      c.className = 'card';
      c.innerHTML = `
        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="thumbnail">
        <div class="title">${titleMap[id] || "제목 불러오기 실패"}</div>
      `;
      c.onclick = () => play(id);
      grid.appendChild(c);
    });
  } catch (e) {
    console.error("비디오 로드 오류:", e);
  }
}

loadVideos();
</script>
</body>
</html>
