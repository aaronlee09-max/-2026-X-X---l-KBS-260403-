<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* 구글 비디오 스트리밍을 화면 비율에 맞춰 강제로 꽉 채우는 CSS */
        .video-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        iframe {
            width: 100%; height: 100%; border: none;
        }
        
        .title {
            position: absolute; top: 20px; left: 20px; color: white; z-index: 10;
            font-family: 'Arial', sans-serif; font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 class="title">AARON SH LEE</h1>

    <div class="video-wrapper">
        <!-- 💡 구글 드라이브 미리보기 샌드박스를 이용해 브라우저 보안 차단을 완전히 무력화합니다 -->
        <iframe src="https://google.com" 
                allow="autoplay" 
                loading="lazy">
        </iframe>
    </div>

</body>
</html>
