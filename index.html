<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -100;
        }
        /* 화면 비율에 상관없이 영상을 꽉 채우는 CSS */
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            border: none;
        }
        .overlay {
            position: absolute; top: 20px; left: 20px; color: white; z-index: 1;
            font-family: 'Arial', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>AARON SH LEE</h1>
    </div>
    <div class="video-background">
        <!-- 보내주신 영상 ID(0AcuMH7KewM)가 자동으로 무한 반복되도록 세팅 완료했습니다 -->
        <iframe src="https://youtube.com" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</body>
</html>
