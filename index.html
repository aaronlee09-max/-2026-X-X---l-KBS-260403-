<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist App</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#player{
    width:100%;
    height:60vh;
    border:none;
    display:block;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
    padding:12px;
}

.card{
    background:#111;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    display:block;
}

.title{
    padding:8px;
    font-size:13px;
    line-height:1.4;
    color:#ddd;
}
</style>
</head>

<body>

<!-- 플레이어 -->
<iframe
    id="player"
    src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
</iframe>

<!-- 썸네일 영역 -->
<div id="grid" class="grid"></div>

<script>

// 🔑 API KEY
const API_KEY = "AIzaSyDlZ1MbNErffWAZFClz90ORgSoWtIBu5vs";

// 🎬 영상 목록
const videos = [

"lgaXjICBcsc",
"0AcuMH7KewM",

"MOtYJB8P0x0",

"e6ngDwYb6Zo",
"gpDV5qUXNYc",
"8asxySoKbTk",
"vsm7CWw5MYc",
"6FODI_m9p58"

];

const grid = document.getElementById("grid");

// ▶ 영상 재생
function play(id){

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1`;

}

// 🎨 카드 출력
function render(titleMap){

    grid.innerHTML="";

    videos.forEach(id=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img
                src="https://img.youtube.com/vi/${id}/mqdefault.jpg"
                loading="lazy"
            >

            <div class="title">
                ${titleMap[id] || "제목 불러오는 중..."}
            </div>
        `;

        card.onclick=()=>play(id);

        grid.appendChild(card);

    });

}

// 📡 제목 불러오기
async function fetchTitles(){

    const titleMap={};

    const chunkSize=50;

    for(let i=0;i<videos.length;i+=chunkSize){

        const ids=videos.slice(i,i+chunkSize).join(",");

        try{

            const response=await fetch(
                `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${ids}&key=${API_KEY}`
            );

            const data=await response.json();

            if(data.items){

                data.items.forEach(item=>{

                    titleMap[item.id]=item.snippet.title;

                });

            }

        }catch(error){

            console.error(error);

        }

    }

    render(titleMap);

}

// 시작
fetchTitles();

</script>

</body>
</html>
