<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body {
    margin: 0;
    background: black;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    background: black;
}
</style>
</head>

<body>

<video autoplay muted controls playsinline preload="auto">
    <source src="https://files.catbox.moe/blos4e.webm" type="video/webm">
</video>

<script>
const v = document.querySelector("video");
v.load();
v.play().catch(()=>{});
</script>

</body>
</html>
