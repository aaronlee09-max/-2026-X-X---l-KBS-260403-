<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            border: none;
        }
        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: white; background: rgba(0,0,0,0.1); cursor: pointer;
        }
        .title { position: absolute; top: 20px; left: 20px; margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .start-btn { padding: 12px 24px; font-size: 1rem; color: #fff; background: #ff0000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 브라우저 자동재생 제한을 해제하기 위한 투명 클릭 레이어 -->
    <div class="overlay-layer" id="overlay" onclick="startVideo()">
        <h1 class="title">AARON SH LEE</h1>
        <button class="start-btn">화면을 클릭하여 영상 시작 🎬</button>
    </div>

    <div class="video-container">
        <!-- 💡 브라우저가 보안상 차단하지 않도록 통제 파라미터(allow 및 sandbox)를 전면 전개했습니다 -->
        <iframe id="player" 
                src="https://youtube.com" 
                allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
        </iframe>
    </div>

    <script>
        function startVideo() {
            var iframe = document.getElementById('player');
            // 유튜브 내부 엔진에 강제 재생 인터페이스 신호 주입
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            
            // 안내 버튼 숨기기
            var overlay = document.getElementById('overlay');
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
