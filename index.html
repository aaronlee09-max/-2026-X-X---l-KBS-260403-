<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>
    <style>
        /* 화면 여백을 완전히 없애고 배경을 검은색으로 고정 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* 영상이 화면 비율에 맞춰 여백 없이 무조건 꽉 차게 만드는 마법의 CSS */
        video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; /* 화질 저하 없이 화면 전체를 강제로 채움 */
            z-index: 1;
        }
        
        .title {
            position: absolute; top: 20px; left: 20px; color: white; z-index: 10;
            font-family: 'Arial', sans-serif; font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 class="title">AARON SH LEE</h1>

        <source src="https://files.catbox.moe/dq9uhu.mp4" type="video/mp4">
        브라우저가 비디오 태그를 지원하지 않습니다.

</body>
</html>
