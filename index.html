<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist</title>

<style>
@font-face {
    font-family: "ParkFont";
    src: url("./[폰트] 박광일체 다운로드.ttf") format("truetype");
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "ParkFont", sans-serif;
}

body {
    background: #000;
    color: #fff;
}

#player {
    width: 100%;
    height: 60vh;
    border: none;
    display: block;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    display: block;
}

.title {
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<iframe
    id="player"
    src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
</iframe>

<div id="grid" class="grid"></div>

<script>

// 🔑 자신의 API 키 입력
const API_KEY = "AIzaSyDlZ1MbNErffWAZFClz90ORgSoWtIBu5vs";

// 🎬 영상 목록
const videos = [
"lgaXjICBcsc",
"0AcuMH7KewM",
"003V9eO5knI",
"i2IK99Kli4E",
"h9vxTcUPz98",
"MOtYJB8P0x0",
"moaAhsbh5Ds",
"ehrbOi8b4c4",
"iwFriq4fPQU",
"9PjnL0mRYm0",
"T6ZYfaQqLyg",
"57D_tv9pj74",
"7V8JI93Lov4",
"tU3nx-f97WM",
"zKd2p9Y6yEY",
"CCa4SuJCxA4",
"An0Tgf74XOY",
"qT8dDKNtPjo",
"V9HV8EoSyR4",
"nrn07ACbpkE",
"So9BeU_Vy20",
"OLMK2AfMPjo",
"ZH-VB-jSVaU",
"6ef-aCP5zMY",
"YJJ_8w2zKbQ",
"qtRCPzBpsA0",
"vbjLJnlB2kg",
"UbQFWXsoAM8",
"e6ngDwYb6Zo",
"gpDV5qUXNYc",
"8asxySoKbTk",
"vsm7CWw5MYc",
"6FODI_m9p58",
"vmd00AxPpxo",
"8qoFBIkTAHk"
];

// ▶ 영상 재생
function play(id) {
    document.getElementById("player").src =
        `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1`;
}

// 📺 제목 불러오기
async function loadVideos() {

    const grid = document.getElementById("grid");

    try {

        const response = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videos.join(",")}&key=${API_KEY}`
        );

        if (!response.ok) {
            throw new Error("API 오류 : " + response.status);
        }

        const data = await response.json();

        const titleMap = {};

        if (data.items) {
            data.items.forEach(item => {
                titleMap[item.id] = item.snippet.title;
            });
        }

        videos.forEach(id => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                <div class="title">
                    ${titleMap[id] || "제목 불러오기 실패"}
                </div>
            `;

            card.onclick = () => play(id);

            grid.appendChild(card);

        });

    } catch (e) {

        console.error(e);

        // API 실패 시에도 썸네일은 표시
        videos.forEach(id => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                <div class="title">제목 불러오기 실패</div>
            `;

            card.onclick = () => play(id);

            grid.appendChild(card);

        });

    }

}

loadVideos();

</script>

</body>
</html>
