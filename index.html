<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>
    <style>
        /* 배경을 시커멓게 밀어버리고 여백 완전 박멸 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* 캣박스 비디오가 브라우저 억까 없이 무조건 화면에 꽉 들어차는 CSS */
        video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; /* 화면 비율 찢어짐 없이 꽉 채우기 */
            z-index: 1;
        }
        
        .title {
            position: absolute; top: 20px; left: 20px; color: white; z-index: 10;
            font-family: 'Arial', sans-serif; font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 class="title">AARON SH LEE</h1>

    <!-- 대망의 캣박스 다이렉트 주소로 브라우저 보안 규제를 완벽하게 우회합니다 -->
    <video autoplay muted loop playsinline>
        <source src="https://catbox.moe" type="video/mp4">
        브라우저가 비디오 태그를 지원하지 않습니다.
    </video>

</body>
</html>
