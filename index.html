<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

/* 플레이어 */
#player {
    width: 100%;
    height: 60vh;
    border: none;
}

/* 썸네일 그리드 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.title {
    font-size: 12px;
    padding: 8px;
    color: #ddd;
}
</style>
</head>

/* 🎯 제목 자동 가져오기 (50개 단위 대용량 Chunking 연산) */
async function fetchTitles() {
    const titleMap = {};
    const chunkSize = 50;
    
    for (let i = 0; i < videos.length; i += chunkSize) {
        const chunk = videos.slice(i, i + chunkSize);
        try {
            const res = await fetch(
                `https://googleapis.com{chunk.join(",")}&key=${API_KEY}`
            );
            const data = await res.json();
            if (data.items) {
                data.items.forEach(item => {
                    titleMap[item.id] = item.snippet.title;
                });
            }
        } catch (error) {
            console.error("API 로딩 에러 발생:", error);
        }
    }

    render(titleMap);
}

/* 🎬 UI 렌더 */
function render(titleMap) {
    videos.forEach(id => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = () => play(id);

        div.innerHTML = `
            <img src="https://youtube.com{id}/mqdefault.jpg">
            <div class="title">${titleMap[id] || "더 시즌즈 인기 음악 컬렉션"}</div>
        `;

        grid.appendChild(div);
    });
}

/* ▶ 재생 */
function play(id) {
    document.getElementById("player").src =
        "https://youtube.com" + id + "?autoplay=1&mute=1&controls=1";
}

fetchTitles();
