<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

iframe {
    width: 100vw;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe
    id="yt"
    src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&playsinline=1&controls=1&rel=0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
</iframe>

<script>
// 일부 브라우저 대응용 강제 재로드 트릭
setTimeout(() => {
    const iframe = document.getElementById("yt");
    iframe.src = iframe.src;
}, 800);
</script>

</body>
</html>
