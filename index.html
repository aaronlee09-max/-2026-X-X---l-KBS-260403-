<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist App</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

/* 플레이어 */
#player {
    width: 100%;
    height: 60vh;
    border: none;
}

/* 썸네일 그리드 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.title {
    font-size: 12px;
    padding: 8px;
    color: #ddd;
}
</style>
</head>

<body>

<!-- 🎥 플레이어 -->
<iframe id="player"
src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<!-- 🎬 썸네일 -->
<div class="grid" id="grid"></div>

<script>

const API_KEY = "AIzaSyDlZ1MbNErffWAZFClz90ORgSoWtIBu5vs";

/* 🎞 영상 전체 목록 (추가 포함) */
const videos = [
"lgaXjICBcsc","0AcuMH7KewM","003V9eO5knI","i2IK99Kli4E","h9vxTcUPz98",
"MOtYJB8P0x0","moaAhsbh5Ds","ehrbOi8b4c4","iwFriq4fPQU","9PjnL0mRYm0",
"T6ZYfaQqLyg","57D_tv9pj74","7V8JI93Lov4","tU3nx-f97WM","zKd2p9Y6yEY",
"CCa4SuJCxA4","An0Tgf74XOY","qT8dDKNtPjo","V9HV8EoSyR4","nrn07ACbpkE",
"So9BeU_Vy20","OLMK2AfMPjo","ZH-VB-jSVaU","6ef-aCP5zMY","YJJ_8w2zKbQ",
"qtRCPzBpsA0","vbjLJnlB2kg","UbQFWXsoAM8","e6ngDwYb6Zo","gpDV5qUXNYc",
"8asxySoKbTk","vsm7CWw5MYc","6FODI_m9p58"
];

const grid = document.getElementById("grid");

/* 🎯 제목 자동 가져오기 */
async function fetchTitles() {
    const res = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videos.join(",")}&key=${API_KEY}`
    );

    const data = await res.json();

    const titleMap = {};
    data.items.forEach(item => {
        titleMap[item.id] = item.snippet.title;
    });

    render(titleMap);
}

/* 🎬 UI 렌더 */
function render(titleMap) {
    videos.forEach(id => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = () => play(id);

        div.innerHTML = `
            <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
            <div class="title">${titleMap[id] || "제목 로딩 실패"}</div>
        `;

        grid.appendChild(div);
    });
}

/* ▶ 재생 */
function play(id) {
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id + "?autoplay=1&mute=1&controls=1";
}

fetchTitles();

</script>

</body>
</html>
