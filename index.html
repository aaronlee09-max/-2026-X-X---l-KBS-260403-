<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#player{
    width:100%;
    height:60vh;
    border:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
    padding:12px;
}

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    display:block;
}

.title{
    padding:8px;
    font-size:13px;
    color:#ddd;
    text-align:center;
}
</style>
</head>

<body>

<!-- 🎬 플레이어 -->
<iframe
id="player"
src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<!-- 📦 리스트 -->
<div id="grid" class="grid"></div>

<script>

const grid = document.getElementById("grid");

/* =========================
   ▶ 재생
   ========================= */
function play(id){
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id + "?autoplay=1&mute=1&controls=1";
}

/* =========================
   🔄 API 로드 + 제목 표시
   ========================= */
async function loadVideos(){

    const url =
    `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videos.join(",")}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const titleMap = {};

    (data.items || []).forEach(item=>{
        titleMap[item.id] = item.snippet.title;
    });

    videos.forEach(id=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
            <div class="title">
                ${titleMap[id] || "제목 없음"}
            </div>
        `;

        card.onclick = () => play(id);
        grid.appendChild(card);

    });
}

/* =========================
   🚀 실행
   ========================= */
loadVideos();

</script>
