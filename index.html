<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Channel</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            font-family: Arial, sans-serif;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <h1 class="title">AARON SH LEE</h1>

    <div class="video-wrapper">
        <iframe
            src="https://www.youtube.com/embed/0AcuMH7KewM?autoplay=1&mute=1&controls=1&rel=0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
